<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Image Downloader</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="container">
      <header class="header">
        <div class="logo" aria-hidden="true">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
            <rect x="3" y="5" width="18" height="14" rx="2" stroke="currentColor" stroke-width="1.8" />
            <circle cx="9" cy="10" r="1.8" fill="currentColor" />
            <path d="M3 16l5-4 4 3 3-2 6 5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" />
          </svg>
        </div>
        <div>
          <h1>Image Downloader</h1>
          <p class="subtitle" id="page-title">Scanning page…</p>
        </div>
      </header>

      <section class="stats">
        <div class="stat-card">
          <span class="stat-label">Showing</span>
          <span class="stat-value"><span id="image-count">—</span> <span class="stat-suffix">images</span></span>
        </div>
        <div class="stat-card">
          <span class="stat-label">Selected</span>
          <span class="stat-value selected" id="selected-count">0</span>
        </div>
      </section>

      <p class="status" id="status" role="status">Scanning the active tab…</p>

      <details class="panel" open>
        <summary>Filters</summary>
        <div class="panel-body">
          <label class="option">
            <input type="checkbox" id="include-backgrounds" checked />
            <span>Include CSS background images</span>
          </label>

          <div class="filter-row">
            <label class="field">
              <span>Min width (px)</span>
              <input type="number" id="min-width" min="0" value="0" />
            </label>
            <label class="field">
              <span>Min height (px)</span>
              <input type="number" id="min-height" min="0" value="0" />
            </label>
          </div>

          <fieldset class="type-filters">
            <legend>File types</legend>
            <div class="type-grid">
              <label><input type="checkbox" class="type-filter" value="jpg" checked /> JPG</label>
              <label><input type="checkbox" class="type-filter" value="png" checked /> PNG</label>
              <label><input type="checkbox" class="type-filter" value="gif" checked /> GIF</label>
              <label><input type="checkbox" class="type-filter" value="webp" checked /> WebP</label>
              <label><input type="checkbox" class="type-filter" value="svg" checked /> SVG</label>
              <label><input type="checkbox" class="type-filter" value="ico" checked /> ICO</label>
              <label><input type="checkbox" class="type-filter" value="avif" checked /> AVIF</label>
              <label><input type="checkbox" class="type-filter" value="bmp" checked /> BMP</label>
            </div>
          </fieldset>
        </div>
      </details>

      <details class="panel" open>
        <summary>Download options</summary>
        <div class="panel-body">
          <div class="radio-group">
            <label class="option">
              <input type="radio" name="download-mode" value="separate" checked />
              <span>Separate files in a page folder</span>
            </label>
            <label class="option">
              <input type="radio" name="download-mode" value="zip" />
              <span>Single ZIP archive</span>
            </label>
          </div>
          <p class="hint" id="folder-hint">
            Saves to <code>Downloads/page-images/</code> using the page title as the folder name.
          </p>
        </div>
      </details>

      <div class="list-toolbar">
        <button id="select-all-btn" class="btn-text" type="button">Select all</button>
        <button id="select-none-btn" class="btn-text" type="button">Select none</button>
      </div>

      <section class="image-list" id="image-list" aria-label="Images on page"></section>

      <button id="scan-btn" class="btn btn-secondary" type="button">Rescan page</button>
      <button id="download-btn" class="btn btn-primary" type="button" disabled>
        Download selected images
      </button>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
